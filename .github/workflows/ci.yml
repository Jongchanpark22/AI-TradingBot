name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ '17' ]

    steps:
    # 1. 코드 체크아웃
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Java 17 설치
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradle 권한 설정
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 빌드 실행 (테스트 포함)
    - name: Build with Gradle
      run: ./gradlew clean build

    # 5. 빌드 성공 결과
    - name: Build Success
      if: success()
      run: echo "✅ Build successful!"

    # 6. 빌드 실패 시
    - name: Build Failed
      if: failure()
      run: echo "❌ Build failed!"
      
    # 7. 테스트 결과 리포트 생성
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: Test Results
        path: build/test-results/test/*.xml
        reporter: 'java-junit'
        fail-on-error: false

    # 8. Gradle 빌드 스캔 (선택사항)
    - name: Build Gradle Build Scan
      if: failure()
      run: ./gradlew build --scan

  # 코드 품질 검사 (선택사항)
  code-quality:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # SpotBugs (버그 검사)
    - name: Run SpotBugs
      run: ./gradlew spotbugsMain -x test || true

    # Checkstyle (코드 스타일)
    - name: Run Checkstyle
      run: ./gradlew checkstyleMain -x test || true

  # 최종 상태 확인
  status:
    runs-on: ubuntu-latest
    needs: [ build ]
    if: always()

    steps:
    - name: Check Job Status
      run: |
        if [ "${{ needs.build.result }}" = "failure" ]; then
          echo "❌ CI Pipeline Failed"
          exit 1
        else
          echo "✅ CI Pipeline Passed"
        fi

