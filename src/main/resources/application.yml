spring:
  application:
    name: crypto-trading-bot

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      # Redis 캐시 설정
      cache:
        type: redis
        redis:
          time-to-live: 10m  # 기본 TTL: 10분

  cache:
    type: redis
    redis:
      time-to-live: 10m

trading:
  scheduler:
    enabled: true        # false로 바꾸면 전략 스케줄러 중지

  scanner:
    min-trade-price-24h: 5000000000   # 최소 24h 거래대금 (50억 KRW)
    max-coins: 20                     # 스캔 결과 최대 코인 수
    min-change-rate: 0.005            # 최소 24h 변동률 (+0.5%, 하락/보합 코인 제외)
    max-change-rate: 0.07             # 최대 24h 변동률 (+7%, 과매수 제외)

  risk:
    stop-loss-percent: 5.0            # 손절 비율 (%) — 2.5→5.0 (ATR 여유 확보)
    take-profit-percent: 10.0          # 목표 수익 비율 (%) — 7→10 (2R 기준)
    max-daily-loss: 10.0              # 일일 최대 손실 한도 (%)
    risk-per-trade: 0.10              # 1회 기본 투자 비율 (총자산의 10%, 승률 회복 전 자본 보호)
    max-order-percent: 0.15           # 1회 최대 투자 비율 (총자산의 15%, STRONG_BUY 시)
    min-order-amount: 20000           # 최소 주문 금액 (KRW)
    max-open-positions: 3             # 최대 동시 보유 코인 수

upbit:
  api:
    base-url: https://api.upbit.com
    timeout-ms: 10000
    access-key: ${UPBIT_ACCESS_KEY}
    secret-key: ${UPBIT_SECRET_KEY}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: list
    display-request-duration: true
  packages-to-scan: com.example.cryptobot

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.example.cryptobot: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
        probes:
            enabled: true
